[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
pythonpath = [
  ".",
]
addopts = "-q"
testpaths = [
  "conductor/tests",
  "mixer/tests",
  "services/guitar/tests",
  "services/oboe/tests",
  "services/drums/tests",
  "services/bass/tests",
  "dashboard/backend/tests",
]

[tool.pylint.main]
py-version = "3.11"
ignore = [".venv"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-class-docstring",
  "missing-function-docstring",
  "duplicate-code",
]
