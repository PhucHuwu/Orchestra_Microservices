services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:${RABBITMQ_PORT:-5672}:5672"
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:${RABBITMQ_MQTT_PORT:-1883}:1883"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./configs/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - orchestra_net

  postgres:
    image: postgres:15
    hostname: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orchestra_net

  conductor:
    build:
      context: ./conductor
    env_file:
      - .env
    environment:
      SCORE_DIR: ${SCORE_DIR:-/shared-scores}
    depends_on:
      - rabbitmq
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:8101:8000"
    volumes:
      - shared_scores:/shared-scores
    networks:
      - orchestra_net

  violin-service:
    build:
      context: .
      dockerfile: ./services/violin/Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: violin-service
      INSTRUMENT_NAME: violin
      INPUT_QUEUE: instrument.violin.note
      OUTPUT_ROUTING_KEY: instrument.violin.output
      INSTRUMENT_WORKER_ENABLED: "true"
    depends_on:
      - rabbitmq
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:8201:8000"
    networks:
      - orchestra_net

  piano-service:
    build:
      context: .
      dockerfile: ./services/piano/Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: piano-service
      INSTRUMENT_NAME: piano
      INPUT_QUEUE: instrument.piano.note
      OUTPUT_ROUTING_KEY: instrument.piano.output
      INSTRUMENT_WORKER_ENABLED: "true"
    depends_on:
      - rabbitmq
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:8202:8000"
    networks:
      - orchestra_net

  drums-service:
    build:
      context: .
      dockerfile: ./services/drums/Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: drums-service
      INSTRUMENT_NAME: drums
      INPUT_QUEUE: instrument.drums.beat
      OUTPUT_ROUTING_KEY: instrument.drums.output
      INSTRUMENT_WORKER_ENABLED: "true"
    depends_on:
      - rabbitmq
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:8203:8000"
    networks:
      - orchestra_net

  cello-service:
    build:
      context: .
      dockerfile: ./services/cello/Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: cello-service
      INSTRUMENT_NAME: cello
      INPUT_QUEUE: instrument.cello.note
      OUTPUT_ROUTING_KEY: instrument.cello.output
      INSTRUMENT_WORKER_ENABLED: "true"
    depends_on:
      - rabbitmq
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:8204:8000"
    networks:
      - orchestra_net

  mixer:
    build:
      context: ./mixer
    env_file:
      - .env
    depends_on:
      - rabbitmq
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:8301:8000"
    networks:
      - orchestra_net

  dashboard-api:
    build:
      context: ./dashboard/backend
    env_file:
      - .env
    environment:
      CONDUCTOR_BASE_URL: ${CONDUCTOR_BASE_URL:-http://conductor:8000}
      SCORE_STORAGE_DIR: ${SCORE_STORAGE_DIR:-/shared-scores}
      AUDIO_OUTPUT_DIR: ${AUDIO_OUTPUT_DIR:-/shared-audio}
      FAULT_TOOLKIT_COMPOSE_CMD: ${FAULT_TOOLKIT_COMPOSE_CMD:-docker compose}
      FAULT_TOOLKIT_RABBITMQ_URL: ${FAULT_TOOLKIT_RABBITMQ_URL:-amqp://orchestra:orchestra@rabbitmq:5672/%2F}
      FAULT_TOOLKIT_EXCHANGE: ${FAULT_TOOLKIT_EXCHANGE:-orchestra.events}
      FAULT_TOOLKIT_NETWORK: ${FAULT_TOOLKIT_NETWORK:-orchestra_net}
      FAULT_TOOLKIT_SESSION_ID: ${FAULT_TOOLKIT_SESSION_ID:-fault-demo-session}
    depends_on:
      - rabbitmq
      - postgres
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:${DASHBOARD_API_PORT:-8000}:8000"
    volumes:
      - shared_scores:/shared-scores
      - shared_audio:/shared-audio
    networks:
      - orchestra_net

  dashboard-web:
    build:
      context: ./dashboard/frontend
    env_file:
      - .env
    depends_on:
      - dashboard-api
    ports:
      - "${ORCHESTRA_BIND_HOST:-0.0.0.0}:${DASHBOARD_WEB_PORT:-3000}:3000"
    networks:
      - orchestra_net

networks:
  orchestra_net:
    name: ${ORCHESTRA_NETWORK_NAME:-orchestra_net}
    driver: bridge
    ipam:
      config:
        - subnet: ${ORCHESTRA_NETWORK_SUBNET:-172.28.0.0/16}

volumes:
  rabbitmq_data:
  postgres_data:
  shared_scores:
  shared_audio:
